<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Remittance Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#f0f4ff;font-family:-apple-system,sans-serif;padding:16px;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-top:24px}
h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,#3b82f6,#14b8a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;text-align:center}
p.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:24px}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#f0f4ff;font-size:15px;padding:12px;outline:none;-webkit-appearance:none;margin-bottom:6px}
input:focus{border-color:#3b82f6}
.chains{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.chain{padding:10px 6px;background:#283548;border:2px solid #334155;border-radius:10px;cursor:pointer;text-align:center;transition:all .15s}
.chain.active{border-color:#3b82f6;background:rgba(59,130,246,.08)}
.chain .icon{font-size:18px;margin-bottom:2px}
.chain .name{font-size:11px;font-weight:600}
.chain .sym{font-size:10px;color:#94a3b8}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#14b8a6);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sec{width:100%;padding:10px;border:1px solid #334155;border-radius:10px;background:#283548;color:#f0f4ff;font-size:13px;cursor:pointer;margin-bottom:8px}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:14px;color:#fca5a5;font-size:13px;margin-bottom:12px;white-space:pre-wrap}
.success-icon{text-align:center;font-size:48px;margin-bottom:12px}
.claim-box{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px;font-family:monospace;font-size:11px;color:#3b82f6;word-break:break-all;margin:12px 0}
.hidden{display:none}
.wallet-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.wallet-info{font-size:12px;color:#94a3b8}
.wallet-addr{font-family:monospace;font-size:11px;color:#f0f4ff}
.btn-wallet{padding:8px 14px;border:1px solid #3b82f6;background:rgba(59,130,246,.1);color:#3b82f6;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.btn-wallet.ok{border-color:#10b981;color:#10b981;background:rgba(16,185,129,.1)}
/* Amount toggle */
.amount-row{display:flex;gap:6px;margin-bottom:6px}
.amount-row input{flex:1;margin-bottom:0}
.mode-btn{padding:0 14px;background:#283548;border:1px solid #334155;border-radius:10px;color:#94a3b8;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;min-width:52px}
.mode-btn.usd{border-color:#10b981;color:#10b981;background:rgba(16,185,129,.08)}
.price-hint{font-size:11px;color:#64748b;margin-bottom:12px;min-height:16px}
</style>
</head>
<body>
<div class="app">
  <h1>Email Remittance</h1>
  <p class="sub">Send crypto to anyone — no wallet needed to receive</p>

  <div id="view-form">
    <div class="card">
      <div class="wallet-bar">
        <div class="wallet-info">
          <div id="w-label">Not connected</div>
          <div class="wallet-addr" id="w-addr"></div>
        </div>
        <button class="btn-wallet" id="btn-w" onclick="connectWallet()">Connect Wallet</button>
      </div>

      <label>Chain</label>
      <div class="chains">
        <div class="chain active" id="c-celo" onclick="setChain('celo','CELO')"><div class="icon">🟡</div><div class="name">Celo</div><div class="sym">CELO</div></div>
        <div class="chain" id="c-base" onclick="setChain('base','ETH')"><div class="icon">🔵</div><div class="name">Base</div><div class="sym">ETH</div></div>
        <div class="chain" id="c-monad" onclick="setChain('monad','MON')"><div class="icon">🟣</div><div class="name">Monad</div><div class="sym">MON</div></div>
      </div>

      <label>Recipient Email</label>
      <input type="email" id="email" placeholder="recipient@gmail.com"/>

      <label>Recipient Receives</label>
      <div class="chains" id="token-selector">
        <div class="chain active" token="CELO">
          <div class="token-btn">CELO</div>
        </div>
      </div>

      <label>Amount — <span id="mode-label">enter in <span id="sym">CELO</span></span></label>
      <div class="amount-row">
        <input type="number" id="amount" placeholder="0.01" min="0" step="any" oninput="onAmountInput()"/>
        <button class="mode-btn" id="mode-btn" onclick="toggleMode()">$ USD</button>
      </div>
      <div class="price-hint" id="price-hint"></div>

      <label>Sender Email (optional)</label>
      <input type="email" id="sender-email" placeholder="sender@example.com"/>

      <button class="btn" id="btn-send" onclick="send()" disabled>Connect wallet to send</button>
    </div>
  </div>

  <div id="view-success" style="display:none">
    <div class="card">
      <div class="success-icon">✅</div>
      <h2 style="text-align:center;margin-bottom:8px">Sent!</h2>
      <p style="text-align:center;color:#94a3b8;font-size:13px;margin-bottom:16px" id="s-sub"></p>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">Claim link:</div>
      <div class="claim-box" id="claim-url"></div>
      <button class="btn-sec" onclick="navigator.clipboard.writeText(document.getElementById('claim-url').textContent).then(()=>{this.textContent='✅ Copied!';setTimeout(()=>this.textContent='📋 Copy claim link',2000)})">📋 Copy claim link</button>
      <button class="btn-sec" onclick="reset()">Send another →</button>
    </div>
  </div>

  <div id="view-error" style="display:none">
    <div class="card">
      <div class="error" id="err-msg"></div>
      <button class="btn-sec" onclick="showForm()">Try again</button>
    </div>
  </div>

  <div id="view-loading" style="display:none">
    <div class="card" style="text-align:center;padding:32px">
      <div style="font-size:32px;margin-bottom:12px">⏳</div>
      <p style="color:#94a3b8">Processing on <span id="chain-name">Celo</span>…</p>
    </div>
  </div>
</div>

<script>
const API = 'https://email-remittance-pro.up.railway.app';
const COINGECKO_IDS = { celo:'celo', base:'ethereum', monad:'monad-network' };
let chain='celo', chainSym='CELO', walletAddr=null, walletProof=null;
let usdMode=false, tokenPrice=null, priceTimer=null;
let recipientToken='CELO'; // store selected token

// ── Token registry (match backend token addresses)
const TOKEN_REGISTRY = {
  celo: [{sym:'CELO',name:'Celo',addr:'NATIVE'},{sym:'cUSD',name:'Celo Dollar',addr:'0x765de816845861e75a25fca122bb6898b8b1282a'},{sym:'USDC',name:'USD Coin',addr:'0xceba9300f2b948710d2653dd7b07f33a8b32118c'}],

  monad:[{sym:'MON',name:'Monad',addr:'NATIVE'}]
};

// ── Price fetch ─────────────────────────────────────────────
async function fetchPrice(){
  try{
    const id = COINGECKO_IDS[chain] || 'celo';
    const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd`);
    const d = await r.json();
    tokenPrice = d[id]?.usd || null;
    updateHint();
  }catch(e){ tokenPrice=null; }
}

function updateHint(){
  const hint = document.getElementById('price-hint');
  const val  = parseFloat(document.getElementById('amount').value)||0;
  if(!val){ hint.textContent=''; return; }
  let token = recipientToken || chainSym;
  if(usdMode && tokenPrice){
    const tokens = (val/tokenPrice).toFixed(6);
    hint.textContent = `≈ ${tokens} ${token} will be sent`;
  } else if(!usdMode && tokenPrice){
    const usd = (val*tokenPrice).toFixed(2);
    hint.textContent = `≈ $${usd} USD`;
  } else {
    hint.textContent = '';
  }
}

function onAmountInput(){ updateHint(); }

function toggleMode(){
  usdMode = !usdMode;
  const btn = document.getElementById('mode-btn');
  const lbl = document.getElementById('mode-label');
  const inp = document.getElementById('amount');
  if(usdMode){
    btn.textContent = (recipientToken||chainSym);
    btn.classList.add('usd');
    lbl.innerHTML = `enter in <strong>USD $</strong>`;
    inp.placeholder = '10.00';
    inp.step = '0.01';
  } else {

</body>
</html>
